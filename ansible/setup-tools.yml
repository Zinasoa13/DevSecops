---
- name: Installer Docker et configurer les outils DevSecOps (SonarQube et Harbor)
  hosts: outils
  vars:
    projet_dest: /opt/devsecops
  tasks:
    - name: Supprimer les anciens fichiers de dépôt pour éviter les conflits
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/apt/sources.list.d/trivy.list
        - /etc/apt/sources.list.d/download_docker_com_linux_ubuntu.list

    - name: Créer le répertoire pour les clés GPG
      file:
        path: /usr/share/keyrings
        state: directory
        mode: '0755'

    - name: Télécharger la clé GPG de Trivy
      get_url:
        url: https://aquasecurity.github.io/trivy-repo/deb/public.key
        dest: /usr/share/keyrings/trivy.gpg
        mode: '0644'

    - name: Ajouter le dépôt Trivy (Moderne)
      apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb {{ ansible_distribution_release }} main"
        state: present
        filename: trivy

    - name: Télécharger la clé GPG de Docker
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /usr/share/keyrings/docker-archive-keyring.gpg
        mode: '0644'

    - name: Configurer le dépôt Docker (Moderne)
      apt_repository:
        repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Installer Docker et Trivy
      apt:
        name: [apt-transport-https, ca-certificates, curl, gnupg, lsb-release, python3-pip, python3-docker, openjdk-17-jdk, docker-ce, docker-ce-cli, containerd.io, docker-compose-plugin, trivy]
        state: present
        update_cache: yes

    - name: Démarrer Docker (Compatibilité WSL2)
      service:
        name: docker
        state: started
        enabled: yes
      ignore_errors: yes

    # ATTENTION: vm.max_map_count au moins égal à 262144 est exigé par Elasticsearch embarqué dans SonarQube
    - name: Configurer vm.max_map_count (pour SonarQube)
      sysctl:
        name: vm.max_map_count
        value: '262144'
        state: present
        reload: yes
      ignore_errors: yes

    - name: Lancer SonarQube
      command: docker compose up -d
      args:
        chdir: "{{ projet_dest }}/serveurs/sonarqube"

  handlers:
    - name: Redémarrer Docker
      service:
        name: docker
        state: restarted
