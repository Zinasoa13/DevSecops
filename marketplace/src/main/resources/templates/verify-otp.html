<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification OTP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            width: 100%;
            max-width: 380px;
            padding: 45px 35px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            animation: slideUp 0.6s ease-out;
            text-align: center;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 26px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        p.instruction {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .error {
            color: #e74c3c;
            text-align: center;
            margin-bottom: 20px;
            padding: 12px;
            background: #fadbd8;
            border-radius: 6px;
            font-size: 14px;
            border-left: 4px solid #e74c3c;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Styling for the 6-digit OTP Input */
        .otp-input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 24px;
            letter-spacing: 12px;
            text-align: center;
            font-weight: bold;
            transition: all 0.3s ease;
            font-family: 'Courier New', Courier, monospace;
            background: #f8f9fa;
        }

        .otp-input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
            transform: translateY(-2px);
        }

        button {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .resend-link {
            display: block;
            margin-top: 20px;
            font-size: 13px;
            color: #764ba2;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .resend-link:hover {
            color: #667eea;
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h3>Vérification</h3>
    <p class="instruction">Veuillez entrer le code à 6 chiffres envoyé à votre adresse e-mail.</p>

    <p class="error" th:if="${error}" th:text="${error}"></p>

    <form th:action="@{/verify-otp}" method="post">
        <!-- Using a single input with pattern and max-length for simplicity -->
        <input type="text" 
               name="otp" 
               class="otp-input" 
               placeholder="000000" 
               pattern="\d{6}" 
               maxlength="6" 
               required 
               oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        
        <button type="submit">Vérifier le code</button>
    </form>

    <a th:href="@{/resend-otp}" class="resend-link">Je n'ai pas reçu de code</a>
</div>

</body>
</html>
