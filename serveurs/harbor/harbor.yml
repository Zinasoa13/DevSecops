# Note: Harbor est généralement installé via un script install.sh à partir des sources.
# Ce fichier est une représentation de configuration avec scanner de vulnérabilité.
hostname: harbor.mon-domaine.local

# Désactivation HTTPS pour configuration de test/VM locale
http:
  port: 80

# https:
#   port: 443
#   certificate: /your/certificate/path
#   private_key: /your/private/key/path

harbor_admin_password: HarborAdmin12345

database:
  password: root123

data_volume: /data

# Intégration de Trivy (Scanner de vulnérabilités)
trivy:
  ignore_unfixed: false
  skip_update: false
  offline_scan: false

# Config logicielle
metric:
  enabled: true
  port: 9090
  path: /metrics
